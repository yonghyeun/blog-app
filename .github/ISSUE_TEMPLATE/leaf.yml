name: Leaf Issue
description: 하나의 bounded outcome을 소유하는 실행 issue를 생성합니다.
title: "chore: "
body:
  - type: markdown
    attributes:
      value: |
        Leaf issue는 하나의 bounded outcome만 소유합니다.
        구현은 issue intake가 통과한 뒤 시작합니다.
        bug, refactor, docs, test 작업도 별도 전용 form이 생기기 전까지 이 form을 사용합니다.

  - type: input
    id: intended-labels
    attributes:
      label: Intended labels
      description: GitHub labels가 없으면 이 값을 issue body에서 유지합니다.
      value: "type:chore, kind:leaf, status:intake, priority:p2, area:ops"
    validations:
      required: true

  - type: input
    id: parent
    attributes:
      label: Parent / Relationship
      description: Parent umbrella 또는 관련 issue.
      placeholder: "Parent: #18"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: 이 leaf가 필요한 이유와 현재 상태.
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: 이 leaf가 완료되면 생기는 결과.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: 이 leaf가 소유하는 작업.
      placeholder: |
        - ...
    validations:
      required: true

  - type: textarea
    id: non-scope
    attributes:
      label: Non-Scope
      description: 이 leaf가 하지 않는 작업.
      placeholder: |
        - ...
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Depends on, Blocked by, Blocks 관계.
      placeholder: |
        - Depends on: #...
        - Blocks: #...
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: pass/fail 가능한 완료 기준.
      placeholder: |
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: completion-signal
    attributes:
      label: Completion Signal
      description: 이 issue를 닫을 수 있는 관찰 가능한 신호.
    validations:
      required: true
