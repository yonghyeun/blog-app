name: Umbrella Issue
description: 여러 leaf를 묶는 parent issue를 생성합니다.
title: "chore: "
body:
  - type: markdown
    attributes:
      value: |
        Umbrella issue는 leaf sequence, shared context, closeout status를 소유합니다.
        제목 summary와 본문 prose는 한국어 우선 작성입니다.

  - type: input
    id: intended-labels
    attributes:
      label: Intended labels
      description: GitHub labels가 없으면 이 값을 issue body에서 유지합니다.
      value: "type:chore, kind:umbrella, status:intake, priority:p2, area:ops"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: 왜 이 umbrella가 필요한지 설명합니다.
      placeholder: |
        이 umbrella가 묶는 문제, 현재 gap, 지금 처리해야 하는 이유.
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: 완료되면 어떤 능력이나 상태가 생기는지 설명합니다.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: 이 umbrella가 소유하는 범위.
      placeholder: |
        - ...
    validations:
      required: true

  - type: textarea
    id: non-scope
    attributes:
      label: Non-Scope
      description: 이 umbrella에서 명시적으로 하지 않는 일.
      placeholder: |
        - ...
    validations:
      required: true

  - type: textarea
    id: leaf-sequence
    attributes:
      label: Leaf Sequence
      description: 예상 leaf 순서와 각 leaf의 책임.
      placeholder: |
        - [ ] Leaf 1: ...
          - Summary:
          - Bounded:
          - Not bounded:
          - AC:
    validations:
      required: true

  - type: textarea
    id: tracking-surface
    attributes:
      label: Tracking Surface
      description: umbrella tracking comment 또는 body에서 추적할 항목.
      placeholder: |
        - leaf order
        - leaf status
        - dependency changes
        - closeout actions
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: pass/fail 가능한 umbrella 완료 기준.
      placeholder: |
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: completion-signal
    attributes:
      label: Completion Signal
      description: 이 umbrella를 닫을 수 있는 관찰 가능한 신호.
    validations:
      required: true
