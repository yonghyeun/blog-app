name: Risk Resolution Issue
description: slice review에서 발견된 engineering risk 또는 병목을 줄입니다.
title: "chore: "
body:
  - type: markdown
    attributes:
      value: |
        Risk-resolution issue는 다음 slice를 방해할 반복 병목을 줄이기 위한 system upgrade입니다.
        모든 불편함이 아니라, 반복 가능성이 높고 비용을 줄이는 병목만 승격합니다.

  - type: input
    id: intended-labels
    attributes:
      label: Intended labels
      description: GitHub labels가 없으면 이 값을 issue body에서 유지합니다.
      value: "type:chore, kind:risk-resolution, status:intake, priority:p1, area:ops"
    validations:
      required: true

  - type: input
    id: related-slice
    attributes:
      label: Related Slice / Issue
      description: 어떤 slice, PR, issue에서 이 risk가 드러났는지 기록합니다.
      placeholder: "Related: #..."
    validations:
      required: true

  - type: textarea
    id: slice-review-finding
    attributes:
      label: Slice Review Finding
      description: slice 이후 드러난 마찰이나 병목.
    validations:
      required: true

  - type: textarea
    id: risk
    attributes:
      label: Risk
      description: 방치하면 다음 slice에 어떤 문제가 반복되는지 설명합니다.
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: 속도, 안정성, 추적성, 품질에 미치는 영향.
    validations:
      required: true

  - type: textarea
    id: resolution-target
    attributes:
      label: Resolution Target
      description: 어떤 system upgrade로 risk를 줄일지 설명합니다.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      placeholder: |
        - ...
    validations:
      required: true

  - type: textarea
    id: non-scope
    attributes:
      label: Non-Scope
      placeholder: |
        - ...
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: future-benefit
    attributes:
      label: Future Benefit
      description: 다음 slice에서 무엇이 쉬워지거나 안전해지는지 설명합니다.
    validations:
      required: true
